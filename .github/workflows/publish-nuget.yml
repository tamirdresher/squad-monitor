name: Publish to NuGet

# Triggers:
#   - Release published (covers new releases and drafts->published)
#   - Manual dispatch with explicit version input
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.2.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore squad-monitor.csproj

    - name: Build
      run: dotnet build squad-monitor.csproj --configuration Release --no-restore

    # Derive package version from the release tag or manual input
    - name: Determine version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "PACKAGE_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
        elif [ "${{ github.event_name }}" = "release" ]; then
          TAG="${{ github.event.release.tag_name }}"
          echo "PACKAGE_VERSION=${TAG#v}" >> $GITHUB_ENV
        fi

    - name: Pack NuGet package
      run: dotnet pack squad-monitor.csproj --configuration Release --no-build --output nupkg /p:PackageVersion=${{ env.PACKAGE_VERSION }}

    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: nupkg/*.nupkg
        retention-days: 30

    - name: Publish to NuGet
      run: dotnet nuget push nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    # Attach the .nupkg to the GitHub Release for direct download
    - name: Attach package to GitHub Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: nupkg/*.nupkg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
