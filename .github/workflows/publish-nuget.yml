name: Publish to NuGet

# Triggers:
#   - Release published (covers new releases and drafts->published)
#   - Manual dispatch with explicit version input
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.2.0 or 1.2.0-preview.1)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore squad-monitor.csproj

    - name: Build
      run: dotnet build squad-monitor.csproj --configuration Release --no-restore

    - name: Extract version from .csproj
      id: csproj_version
      run: |
        VERSION_PREFIX=$(grep -oPm1 '(?<=<VersionPrefix>)[^<]+' squad-monitor.csproj)
        echo "version_prefix=$VERSION_PREFIX" >> "$GITHUB_OUTPUT"
        echo "📦 .csproj VersionPrefix: $VERSION_PREFIX"

    # Derive package version from the release tag, manual input, or .csproj
    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          PACKAGE_VERSION="${{ github.event.inputs.version }}"
        elif [ "${{ github.event_name }}" = "release" ]; then
          TAG="${{ github.event.release.tag_name }}"
          PACKAGE_VERSION="${TAG#v}"
        fi

        IS_PRERELEASE=false
        if [[ "$PACKAGE_VERSION" == *"-"* ]]; then
          IS_PRERELEASE=true
        fi

        echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
        echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
        echo "📦 Publishing version: $PACKAGE_VERSION (pre-release: $IS_PRERELEASE)"

    - name: Pack NuGet package
      run: dotnet pack squad-monitor.csproj --configuration Release --no-build --output nupkg /p:PackageVersion=${{ env.PACKAGE_VERSION }}

    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: nupkg/*.nupkg
        retention-days: 30

    - name: Publish to NuGet.org
      if: env.HAS_NUGET_KEY == 'true'
      run: dotnet nuget push nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
      env:
        HAS_NUGET_KEY: ${{ secrets.NUGET_API_KEY != '' }}

    - name: Publish to GitHub Packages
      run: dotnet nuget push nupkg/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate

    # Attach the .nupkg to the GitHub Release for direct download
    - name: Attach package to GitHub Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: nupkg/*.nupkg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
